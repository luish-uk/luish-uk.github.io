<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Post!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <nav class="navbar border-bottom border-body container-fluid bg-light">
        <div class="container g-5 justify-content-start">
            <a class="navbar-brand text-decoration-none pr-3" href="/">Home</a>
            <a class="navbar-text text-decoration-none px-3" href="/newpost">New Post</a>
            <a class="navbar-text text-decoration-none px-3" href="/submit">About</a>
        </div>
    </nav>
    <form action="/submit" method="POST" class="container g-5">
        <div class="mb-3 mt-5">
            <label class="form-label">Title</label>
            <input autofocus id="title" name="title" class="form-control">
        </div>
        <br>
        <div class="mb-3">
            <label class="form-label">Subject</label>
            <input id="Subject" name="subject" class="form-control">
        </div>
        <br>
        <div class="mb-3">
            <label class="form-label">Message</label>
            <textarea placeholder="Start typing!" rows="3" id="content" name="content" class="form-control"></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input id="password" name="password" class="form-control">
        </div>
        <div class="mb-3">
            <button class="btn btn-primary" type="submit">Send!</button>
            <a href="/" class="btn">Home</a>
        </div>
    </form>
</body>
</html>
