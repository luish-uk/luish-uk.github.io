<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luis' Blog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <nav class="navbar border-bottom border-body container-fluid bg-light">
        <div class="container g-5 justify-content-start">
            <a class="navbar-brand text-decoration-none pr-3" href="/">Home</a>
            <a class="navbar-text text-decoration-none px-3" href="/newpost">New Post</a>
            <a class="navbar-text text-decoration-none px-3" href="/submit">About</a>
        </div>
    </nav>
    <div class="container g-5">
        <h1 class="mt-5 --bs-heading-color">Welcome to Luis' blog</h1>
        <br>
        <h2>All posts</h2>
        {% block posts %}
        {% for post in posts %}
        <article class="border-bottom border-top">
            <h4 class="pt-2">{{post[1]}}</h3>
            <h6>{{post[2]}}</h4>
            <p>{{post[3]}}</p>
            <footer class="pb-2">{{post[4]}}</footer>
        </article>
        {% endfor %}
        {% endblock %}
    </div>
</body>
</html>
